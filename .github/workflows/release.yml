name: Cross-Platform Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Make Build Script Executable
        run: chmod +x macOS/build.sh

      - name: Compile and Package Application
        run: cd macOS && ./build.sh ${{ env.VERSION }}

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: macOS/JustAStopwatch.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract Version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $env:GITHUB_ENV

      - name: Compile Windows WPF App
        run: |
          cd Windows
          dotnet publish JustAStopwatch.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:Version=${{ env.VERSION }}

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: Windows/bin/Release/net8.0-windows/win-x64/publish/JustAStopwatch.exe

  publish:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            git log -n 5 --oneline > changelog.txt
          else
            git log ${PREV_TAG}..HEAD --oneline > changelog.txt
          fi
          
          # Remove the chore commit from changelog
          sed -i '/chore: Bump version/d' changelog.txt
          
          if [ ! -s changelog.txt ] || [ $(wc -l < changelog.txt) -eq 1 ]; then
            echo "No changes, version bump to remain cross platform parity." > changelog.txt
          fi

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/macos-dmg/JustAStopwatch.dmg
            artifacts/windows-exe/JustAStopwatch.exe
          name: JustAStopwatch ${{ github.ref_name }}
          body_path: changelog.txt
          draft: true
          prerelease: false
