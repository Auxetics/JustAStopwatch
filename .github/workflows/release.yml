name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0)'
        required: true
        default: 'v1.0'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION_CLEAN=$(echo "${{ github.event.inputs.version }}" | sed 's/^v//')
            echo "VERSION=$VERSION_CLEAN" >> $GITHUB_ENV
            echo "TAG_NAME=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
            echo "TAG_NAME=$GITHUB_REF_NAME" >> $GITHUB_ENV
          fi

      - name: Make Build Script Executable
        run: chmod +x build.sh

      - name: Compile and Package Application
        run: ./build.sh ${{ env.VERSION }}

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: JustAStopwatch.dmg
          name: JustAStopwatch ${{ env.TAG_NAME }}
          draft: true
          prerelease: false
          generate_release_notes: true
